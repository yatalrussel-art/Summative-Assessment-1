<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wondering Photographer</title>
    <link rel="stylesheet" href="structure.css">
</head>

<body>

    <header>
        <h1>The Wondering Photographer</h1>
        <img src="TheDivider.png" alt="" aria-hidden="true" class="divider">
        <h2>Photo Gallery</h2>
    </header>

    <main>

        <article class="gallery">
            <figure class="first-figure">
                <div class="image-wrapper">
                    <img src="OceanPhoto.jpg" alt="Coast of Greenland">
                </div>
                <figcaption>
                    <heading3>Coast of Greenland</heading3>
                    <p>This was from a fabulous trip to the cost <br>of Greenland with my family. The water was lovely- but
                        very cold!</p>
                    <button type="button"><img src="shopping.svg" alt="Shopping Basket" class="button-icon">Add to Cart</button>
                </figcaption>
            </figure>
            <figure>
                <img src="BridgePhoto.jpg" alt="The Golden Gate Bridge">
                <figcaption>
                    <heading3>The Golden Gate Bridge</heading3>
                    <p>A picture of the Golden Gate Bridge.<br>New York! New York!</p>
                    <button type="button"><img src="shopping.svg" alt="Shopping Basket" class="button-icon">Add to Cart</button>
                </figcaption>
            </figure>
            <figure>
                <img src="ValleyPhoto.jpg" alt="River valley in Greenland">
                <figcaption>
                    <heading3>River Valley in Greenland</heading3>
                    <p>Another great photo from Greenland. It's a river valley where a glacier used to be.</p>
                    <button type="button"><img src="shopping.svg" alt="Shopping Basket" class="button-icon">Add to Cart</button>
                </figcaption>
            </figure>

            <figure>
                <img src="WaterfallPhoto.jpg" alt="Waterfall in Greenland">
                <figcaption>
                    <heading3>Waterfall in Greenland</heading3>
                    <p>The waterfall made such a lovely sound.<br> i could have fallen asleep!</p>
                    <button type="button"><img src="shopping.svg" alt="Shopping Basket" class="button-icon">Add to Cart</button>
                </figcaption>
            </figure>
        </article>
    </main>

    <footer>
        <img src="TheDivider.png" alt="" aria-hidden="true" class="divider">
        <p>Copyright The Wondering Photographer 2018.</p>
        <nav aria-label="Navigation">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="#about">About me</a></li>
            </ul>
        </nav>
    </footer>

</body>

</html>
